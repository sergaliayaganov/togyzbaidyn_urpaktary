﻿<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>АДАМ атадан АЛАШ-қа дейін</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
  overflow: hidden;
}

#tree {
  width: 100vw;
  height: 100vh;
}

/* BUTTONS */
#buttons{
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1000;
}

#buttons button{
  padding:10px 18px;
  margin-right:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.homeBtn{
  background:#4CAF50;
  color:white;
}

.backBtn{
  background:#ff9800;
  color:white;
}

.node rect {
  fill-opacity: 0.35;
}

.node text {
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
}

.link {
  fill: none;
  stroke: #999;
  stroke-width: 2;
}
</style>
</head>

<body>

<div id="buttons">
  <button class="homeBtn" onclick="goHome()">🏠 Үйге</button>
  <button class="backBtn" onclick="undoAction()">↩ Артқа</button>
</div>

<svg id="tree"></svg>

<script>

const svg = d3.select("#tree");
const g = svg.append("g");

const startX = 150;
const startY = window.innerHeight / 2;

let root;
let historyStack = [];

// HOME
function goHome(){
  window.location.href="https://sergaliayaganov.github.io/togyzbaidyn_urpaktary/";
}

// ZOOM
const zoom = d3.zoom().on("zoom", e => {
  g.attr("transform", e.transform);
});

svg.call(zoom);

svg.call(
  zoom.transform,
  d3.zoomIdentity.translate(startX, startY)
);

// COLLAPSE
function collapseAll(d, level = 0) {
  if (d.children) {
    if (level >= 2) {
      d._children = d.children;
      d._children.forEach(child => collapseAll(child, level + 1));
      d.children = null;
    } else {
      d.children.forEach(child => collapseAll(child, level + 1));
    }
  }
}

// SAVE TREE STATE
function serializeTree(node){
  return {
    name: node.data.name,
    children: node.children ? node.children.map(serializeTree) : null,
    _children: node._children ? node._children.map(serializeTree) : null
  };
}

// RESTORE TREE STATE
function restoreTree(saved,node){

  if(saved.children){
    node.children=node.children||node._children||[];
    node._children=null;

    for(let i=0;i<saved.children.length;i++){
      restoreTree(saved.children[i],node.children[i]);
    }

  }else if(saved._children){

    node._children=node.children||node._children||[];
    node.children=null;

    for(let i=0;i<saved._children.length;i++){
      restoreTree(saved._children[i],node._children[i]);
    }
  }
}

// SAVE ACTION
function saveState(){
  historyStack.push(JSON.stringify(serializeTree(root)));
}

// UNDO
function undoAction(){

  if(historyStack.length===0) return;

  const previous = JSON.parse(historyStack.pop());

  restoreTree(previous,root);

  update();
}

// JSON оқу
fetch('abdul_bashar.json')
  .then(res => res.json())
  .then(data => {
    root = d3.hierarchy(data);
    collapseAll(root);
    update();
  });

// toggle
function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else {
    d.children = d._children;
    d._children = null;
  }
}

// draw
function update() {

  g.selectAll("*").remove();

  let maxLen = 0;
  root.descendants().forEach(d => {
    if (d.data.name.length > maxLen) maxLen = d.data.name.length;
  });

  const charWidth = 8;
  const nodeWidth = Math.max(120, maxLen * charWidth + 40);
  const nodeHeight = 40;

  const treeLayout = d3.tree().nodeSize([80, nodeWidth + 120]);
  treeLayout(root);

  // LINKS
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class", "link")
    .attr("stroke", d => d.target.data.type === "жиен" ? "gold" : "#999")
    .attr("stroke-width", d => d.target.data.type === "жиен" ? 4 : 2)
    .attr("d", d => {
      const startX = d.source.y + nodeWidth / 2;
      const startY = d.source.x;

      const endX = d.target.y - nodeWidth / 2;
      const endY = d.target.x;

      const midX = (startX + endX) / 2;

      return `
        M${startX},${startY}
        C${midX},${startY}
         ${midX},${endY}
         ${endX},${endY}
      `;
    });

  // nodes
  const nodes = g.selectAll(".node")
    .data(root.descendants(), d => d.data.name);

  const enter = nodes.enter()
    .append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click", (event, d) => {

      if (d.data.name === "Шағалақ") {
        alert("Бұл бөлімде Әлдеберлінің ұрпақтары таратылған");
        return;
      }

      saveState();   // <-- тарихқа сақтау

      toggle(d);
      update();
    });

  enter.append("rect")
    .attr("x", -nodeWidth / 2)
    .attr("y", -nodeHeight / 2)
    .attr("width", nodeWidth)
    .attr("height", nodeHeight)
    .attr("rx", nodeHeight / 2)
    .attr("fill", d =>
      d.data.gender === "female" ? "#f7a6c6" : "#8bb7ff"
    )
    .attr("stroke", d =>
      d.data.type === "жиен"
        ? "gold"
        : (d.data.gender === "female" ? "#d95380" : "#3b70d6")
    )
    .attr("stroke-width", d =>
      d.data.type === "жиен" ? 4 : 2
    );

  enter.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "0.35em")
    .text(d => d.data.name);

  nodes.merge(enter)
    .transition()
    .attr("transform", d => `translate(${d.y},${d.x})`);
}

</script>

</body>
</html>
